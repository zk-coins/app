name: Deploy DEV

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  DOCKER_TAGS: zkcoin/app:beta

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and deploy to DEV
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        # DEV mirrors PRD — no feature-flag build-args. Build-time
        # client gates (`NEXT_PUBLIC_ENABLE_*`) default to false and
        # DCE strips them from the bundle. Server-gated UI
        # (faucet, usernames) is driven by `/api/info.capabilities` at
        # runtime, so the same image works against any DEV / PRD server
        # without rebuilding. See issues #30 and #97.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_TAGS }}
          platforms: linux/arm64

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/download/2025.4.0/cloudflared-linux-arm64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Deploy to DEV
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_DEV_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_DEV_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key \
            -o ProxyCommand="cloudflared access ssh --hostname ${{ secrets.DEPLOY_DEV_HOST }}" \
            ${{ secrets.DEPLOY_DEV_USER }}@${{ secrets.DEPLOY_DEV_HOST }} \
            "zkcoins-app"
