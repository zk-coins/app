name: Audit Button Coverage

on:
  pull_request:
    branches: [develop]
    paths:
      - 'src/**'
      - 'e2e/**'
      - '.github/workflows/audit-button-coverage.yml'
  push:
    branches: [develop]
    paths:
      - 'src/**'
      - 'e2e/**'
      - '.github/workflows/audit-button-coverage.yml'

concurrency:
  group: audit-button-coverage-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: Button-Inventory-Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run audit (strict — backlog cleared)
        id: audit
        run: |
          {
            echo 'report<<AUDIT_EOF'
            node e2e/_audit/coverage.mjs --markdown
            echo 'AUDIT_EOF'
          } >> "$GITHUB_OUTPUT"
          node e2e/_audit/coverage.mjs

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: audit-button-coverage
          message: ${{ steps.audit.outputs.report }}
